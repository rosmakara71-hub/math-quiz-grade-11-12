<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>កម្រងលំហាត់គណិតវិទ្យាសម្រាប់ថ្នាក់ទី១១និង១២</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; padding: 20px; background-color: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1e3c72; margin-bottom: 30px; line-height: 1.6; }
        h3 { color: #2c3e50; margin-top: 25px; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .card-link { 
            display: block; padding: 12px; text-align: center; background: #2a5298; 
            color: white; text-decoration: none; border-radius: 6px; font-size: 14px; transition: 0.3s;
        }
        .card-link:hover { background: #1e3c72; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h2>កម្រងលំហាត់គណិតវិទ្យាសម្រាប់ថ្នាក់ទី១១និង១២<br>
    រៀបចំដោយលោកគ្រូ រស់ មករា<br>
    <span style="font-size: 16px;">Telegram: 086 228 508</span></h2>
    
    <h3>កម្រងលំហាត់ស្របតាមមេរៀនគណិតវិទ្យាថ្នាក់ទី១២</h3>
    <div class="grid-menu" id="group-a"></div>

    <h3>កម្រងលំហាត់ស្របតាមមេរៀនគណិតវិទ្យាថ្នាក់ទី១១</h3>
    <div class="grid-menu" id="group-b"></div>

    <h3>កម្រងលំហាត់ត្រៀមប្រឡងថ្នាក់ទី១២</h3>
    <div class="grid-menu" id="group-c"></div>

    <h3>កម្រងលំហាត់ត្រៀមប្រឡងថ្នាក់ទី១១</h3>
    <div class="grid-menu" id="group-d"></div>

    <h3>ធរណីមាត្រក្នុងលំហសម្រាប់ថ្នាក់ទី១១និង១២</h3>
    <div class="grid-menu" id="group-vector"></div>


    <script>
        // បញ្ជីទិន្នន័យ
        const aRepo = [
            { id: "complexnumber", name: "ចំនួនកុំផ្លិច" },
            { id: "firstode", name: "សមីការឌីផេរ៉ង់ស្យែល" },
            { id: "math-test-ode1", name: "តេស្តសមីការឌីផេរ៉ង់ស្យែលលំដាប់១" }
        ];

        const bRepo = [
            { id: "math-tri1", name: "ត្រីកោណមាត្រ ភាគ១" },
            { id: "domain", name: "ដែនកំណត់នៃអនុគមន៍" },
            { id: "period", name: "ខួបនៃអនុគមន៍" },
            { id: "trigonometric-evenodd", name: "អនុគមន៍គូ-សេស ត្រីកោណមាត្រ" },
            { id: "math11-value-trigonometric", name: "តម្លៃអនុគមន៍ត្រីកោណមាត្រ (ថ្នាក់ទី១១)" },
            { id: "trigonometric-rule", name: "រូបមន្តត្រីកោណមាត្រ" },
            { id: "trigonometric-equation", name: "សមីការត្រីកោណមាត្រ" }
        ];

        const vectorRepo = [
            { id: "Vector-1", name: "វ៉ិចទ័រ មេរៀនទី ១" },
            { id: "Vector-2", name: "វ៉ិចទ័រ មេរៀនទី ២" },
            { id: "Vector-4", name: "វ៉ិចទ័រ មេរៀនទី ៤" },
            { id: "Vector-5", name: "វ៉ិចទ័រ មេរៀនទី ៥" },
            { id: "Vector-6", name: "វ៉ិចទ័រ មេរៀនទី ៦" },
            { id: "Vector-7", name: "វ៉ិចទ័រ មេរៀនទី ៧" },
            { id: "Vector-8", name: "វ៉ិចទ័រ មេរៀនទី ៨" },
            { id: "Vector-9", name: "វ៉ិចទ័រ មេរៀនទី ៩" },
            { id: "Vector-10", name: "វ៉ិចទ័រ មេរៀនទី ១០" },
            { id: "Vector-11", name: "វ៉ិចទ័រ មេរៀនទី ១១" }
        ];

        const cRepo = [
            { id: "math-test1", name: "វិញ្ញាសាតេស្តគណិតវិទ្យា ១" },
            { id: "math-test2", name: "វិញ្ញាសាតេស្តគណិតវិទ្យា ២" },
            { id: "math12-test", name: "វិញ្ញាសាតេស្ត ថ្នាក់ទី១២" },
            { id: "prebacIISS", name: "វិញ្ញាសាត្រៀមប្រឡងបាក់ឌុបថ្នាក់សង្គម" },
            { id: "preexamgrade12bacII", name: "ត្រៀមបាក់ឌុប" },
            { id: "preexamgrade12bacII-1", name: "ត្រៀមបាក់ឌុប វិញ្ញាសាទី ១" },
            { id: "preexamgrade12bacII-2", name: "ត្រៀមបាក់ឌុប វិញ្ញាសាទី ២" },
            { id: "preexamgrade12bacII-3", name: "ត្រៀមបាក់ឌុប វិញ្ញាសាទី ៣" },
            { id: "preexamgrade12bacII-4", name: "ត្រៀមបាក់ឌុប វិញ្ញាសាទី ៤" },
            { id: "preexamgrade12bacII-5", name: "ត្រៀមបាក់ឌុប វិញ្ញាសាទី ៥" },
            { id: "preexamgrade12bacII-6", name: "ត្រៀមបាក់ឌុប វិញ្ញាសាទី ៦" }
        ];

        const dRepo = [
            { id: "preexamgrade11term2", name: "ត្រៀមប្រឡងទី១១ ឆមាសទី២ (ច្បាប់១)" },
            { id: "preexamgrade11term2-2", name: "ត្រៀមប្រឡងទី១១ ឆមាសទី២ (ច្បាប់២)" },
            { id: "preexamgrade11term2-3", name: "ត្រៀមប្រឡងទី១១ ឆមាសទី២ (ច្បាប់៣)" }
        ];

        // Function សម្រាប់បង្ហាញប៊ូតុងទៅតាមក្រុមនីមួយៗ
        function renderButtons(repoList, elementId) {
            const container = document.getElementById(elementId);
            if (!container) return; // ការពារកុំឲ្យ error បើរក ID មិនឃើញ
            let htmlContent = "";
            repoList.forEach(repo => {
                const url = `https://rosmakara71-hub.github.io/${repo.id}`;
                htmlContent += `<a href="${url}" class="card-link" target="_blank">${repo.name}</a>`;
            });
            container.innerHTML = htmlContent;
        }

        // ដំណើរការដាក់ប៊ូតុងចូលទៅក្នុង HTML ឲ្យត្រូវតាមក្រុម
        renderButtons(aRepo, "group-a");
        renderButtons(bRepo, "group-b");
        renderButtons(vectorRepo, "group-vector");
        renderButtons(cRepo, "group-c");
        renderButtons(dRepo, "group-d");
    </script>
</div>

</body>
</html>
